<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Portal | وەرگرتنی بڕوانامە</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&family=Noto+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-title: #4ade80; 
            --text-body: #94a3b8;
            --text-input: #f1f5f9;
            --input-fill: #0f172a;
            --gold: #d4af37;
            --border-color: #334155;
            --shadow: rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-title: #15803d; 
            --text-body: #64748b;
            --text-input: #1e293b;
            --input-fill: #f8fafc;
            --gold: #c5a059;
            --border-color: #e2e8f0;
            --shadow: rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Inter', 'IBM Plex Sans Arabic Text', Doran;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-color: var(--bg-page);
            transition: background-color 0.4s ease;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center;
            filter: blur(8px); transform: scale(1.1); z-index: -1; opacity: 0.3;
        }

        /* TOP NAVIGATION */
        .top-nav {
            position: fixed; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 100;
        }
        [dir="ltr"] .top-nav { right: auto; left: 20px; flex-direction: row-reverse; }

        .nav-btn {
            background: var(--bg-card); color: var(--text-title);
            border: 2px solid var(--gold); border-radius: 50px;
            padding: 10px 20px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 10px var(--shadow); transition: 0.3s;
            font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .contact-bottom {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            background: var(--bg-card); color: var(--gold);
            border: 2px solid var(--gold); border-radius: 50px;
            padding: 12px 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px var(--shadow); transition: 0.3s;
            text-decoration: none; font-size: 15px;
            display: flex; align-items: center; gap: 8px;
        }
        .contact-bottom:hover { background: var(--gold); color: white; transform: translateX(-50%) translateY(-3px); }

        .main-container {
            background: var(--bg-card); padding: 60px 40px; border-radius: 24px; 
            border: 2px solid var(--gold); box-shadow: 0 30px 60px var(--shadow);
            text-align: center; width: 95%; max-width: 1000px; position: relative;
            margin-bottom: 80px; box-sizing: border-box;
        }

        h1 { font-family: 'Doran NoEn', serif; color: var(--text-title); font-size: 28px; margin: 20px 0 10px; }
        .subtitle { color: var(--text-body); font-size: 18px; margin-bottom: 35px; }

        .input-box {
            background: var(--input-fill); 
            border: 1px solid var(--border-color);
            border-radius: 12px; 
            padding: 18px; 
            width: 100%; 
            font-size: 20px; 
            text-align: center; 
            direction: ltr; 
            margin: 0 auto 20px auto; 
            box-sizing: border-box; 
            color: var(--text-input);
            display: block;
        }
        .input-box:focus { outline: none; border-color: var(--gold); }

        .btn-main { 
            width: 100%; padding: 18px; font-size: 18px; font-weight: bold; 
            cursor: pointer; border-radius: 12px; border: none; transition: 0.3s;
            background: var(--text-title); color: #0f172a;
            display: flex; align-items: center; justify-content: center;
        }
        [data-theme="light"] .btn-main { color: white; }
        .btn-main:hover { opacity: 0.9; }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        /* SMOOTH TRANSITION ANIMATIONS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        #result { 
            margin-top: 35px; 
            display: none; 
            border-top: 1px solid var(--border-color); 
            padding-top: 30px;
            width: 100%;
            box-sizing: border-box;
            animation: fadeInUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        #certPreview { 
            width: 100%; max-width: 100%; height: auto;
            border-radius: 12px; box-shadow: 0 10px 25px var(--shadow); 
            margin: 0 auto 20px auto; border: 5px solid white; 
            display: block; box-sizing: border-box;
        }

        .btn-download { 
            background: var(--gold); color: white; margin: 20px auto 0 auto; 
            width: 100%; display: block; text-decoration: none; padding: 18px; 
            border-radius: 12px; font-weight: bold; box-sizing: border-box;
            text-align: center; transition: 0.3s;
        }
        .btn-download:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width: 600px) {
            .top-nav { width: calc(100% - 40px); justify-content: space-between; }
            .nav-btn { padding: 8px 12px; font-size: 11px; }
        }
    </style>
</head>
<body data-theme="dark">

<div class="top-nav">
    <button class="nav-btn" onclick="toggleLanguage()" id="langBtn">🌐 English</button>
    <button class="nav-btn" onclick="toggleTheme()" id="themeBtn">☀️ شێوازی ڕووناک</button>
</div>

<a href="https://t.me/Fergayzanist" target="_blank" class="contact-bottom" id="contactBtn">✈️ پەیوەندی • Contact</a>

<div class="main-container">
    <div id="text-ku">
        <h1>وەرگرتنی بڕوانامەی خولی ڕاهێنانی مامۆستایانی قورئان و پەروەردەی ئیسلامی</h1>
        <p class="subtitle">تکایە ژمارەی مۆبایلەکەت بنووسە بۆ داگرتنی بڕوانامە.</p>
    </div>

    <div id="text-en" style="display: none;">
        <h1>Certification Portal</h1>
        <p class="subtitle">Welcome, please enter your phone number to download your certificate.</p>
    </div>

    <input type="text" class="input-box" id="phoneInput" placeholder="7XX XXX XXXX">
    <button class="btn-main" onclick="checkCertificate()" id="searchBtn">گەڕان • Search</button>

    <div id="result">
        <p style="color: var(--text-title); font-weight: bold; font-size: 16px; margin-bottom: 15px;">بڕوانامەکەت دۆزرایەوە / Found!</p>
        <img id="certPreview" src="" alt="Certificate">
        <a id="downloadBtn" href="" download class="btn-download">داگرتن • Download</a>
    </div>
</div>

    const certificateMap = {

    };

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        const isDark = body.getAttribute('data-theme') === 'dark';
        if (isDark) {
            body.setAttribute('data-theme', 'light');
            btn.innerHTML = (currentLang === 'ku') ? "🌙 شێوازی تاریک" : "🌙 Dark Mode";
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerHTML = (currentLang === 'ku') ? "☀️ شێوازی ڕووناک" : "☀️ Light Mode";
        }
    }

    function toggleLanguage() {
        const h = document.getElementById('htmlTag');
        const k = document.getElementById('text-ku');
        const e = document.getElementById('text-en');
        const lBtn = document.getElementById('langBtn');
        const tBtn = document.getElementById('themeBtn');
        const cBtn = document.getElementById('contactBtn');
        const isDark = document.body.getAttribute('data-theme') === 'dark';

        if (currentLang === 'ku') {
            h.setAttribute('dir', 'ltr'); k.style.display = 'none'; e.style.display = 'block'; 
            lBtn.innerText = '🌐 کوردی'; currentLang = 'en';
            tBtn.innerHTML = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
            cBtn.innerHTML = "✈️ Contact";
        } else {
            h.setAttribute('dir', 'rtl'); k.style.display = 'block'; e.style.display = 'none'; 
            lBtn.innerText = '🌐 English'; currentLang = 'ku';
            tBtn.innerHTML = isDark ? "☀️ شێوازی ڕووناک" : "🌙 شێوازی تاریک";
            cBtn.innerHTML = "✈️ پەیوەندی • Contact";
        }
    }

    function checkCertificate() {
        const btn = document.getElementById('searchBtn');
        const result = document.getElementById('result');
        const inputRaw = document.getElementById('phoneInput').value.trim();
        const inputClean = inputRaw.replace(/[\s\-\(\)]/g, ""); 
        
        // Hide previous result
        result.style.display = "none";
        
        if (inputClean === "") {
            alert(currentLang === 'ku' ? "تکایە ژمارەیەک بنووسە" : "Please enter a number");
            return;
        }

        // START LOADING STATE
        const originalContent = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> ${currentLang === 'ku' ? 'چاوەڕوانبە...' : 'Searching...'}`;

        // Intentional delay for a smoother "searching" feel
        setTimeout(() => {
            let foundSerial = null;
            for (let phone in certificateMap) {
                if (phone.replace(/[\s\-\(\)]/g, "") === inputClean) { 
                    foundSerial = certificateMap[phone]; 
                    break; 
                }
            }

            if (foundSerial) {
                const fileName = "certs/" + foundSerial + ".jpg";
                const img = document.getElementById('certPreview');
                img.src = fileName;
                
                img.onload = function() {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    result.style.display = "block";
                    
                    // Smooth scroll to result
                    setTimeout(() => {
                        result.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                };
            } else {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                alert(currentLang === 'ku' ? "بڕوانامەکە نەدۆزرایەوە" : "Certificate not found");
            }
        }, 700);
    }
</script>
</body>
</html>
