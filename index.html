<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Portal | وەرگرتنی بڕوانامە</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --emerald: #064e3b; /* Deep Islamic Green */
            --gold: #d4af37;    /* Classic Gold */
            --cream: #fdfbf7;
            --text-dark: #1a2e25;
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-color: var(--emerald);
        }

        /* 1. ISLAMIC PATTERN BACKGROUND */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpg'); /* Your primary BG */
            background-size: cover; background-position: center;
            filter: blur(8px) brightness(0.4);
            transform: scale(1.1); z-index: -1;
        }

        /* Overlaying a geometric pattern layer */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); /* Subtle geometric pattern */
            opacity: 0.15; z-index: -1;
        }

        /* 2. THE CARD DESIGN */
        .main-container {
            background: var(--cream);
            padding: 40px;
            border-radius: 0px; /* Classic sharp edges or very slight rounding */
            border: 3px solid var(--gold);
            outline: 10px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 450px;
            position: relative;
            box-sizing: border-box;
        }

        .lang-switch {
            position: absolute; top: 15px; left: 15px;
            background: var(--emerald); color: var(--gold);
            padding: 5px 15px; border: 1px solid var(--gold);
            cursor: pointer; font-size: 12px; font-weight: bold;
        }
        [dir="ltr"] .lang-switch { left: auto; right: 15px; }

        /* 3. TYPOGRAPHY */
        h1 { 
            font-family: 'Amiri', serif; /* Traditional Arabic font style */
            color: var(--emerald); 
            font-size: 32px; 
            margin: 10px 0;
            border-bottom: 2px solid var(--gold);
            display: inline-block;
            padding-bottom: 5px;
        }
        
        .subtitle { 
            color: var(--text-dark); 
            font-size: 16px; 
            margin-bottom: 30px; 
            line-height: 1.6;
            font-style: italic;
        }

        /* 4. FORM ELEMENTS */
        input {
            width: 100%; padding: 16px; border: 1px solid #ccc;
            background: #fff; font-size: 18px; box-sizing: border-box;
            text-align: center; direction: ltr; margin-bottom: 20px;
        }
        input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .btn {
            width: 100%; padding: 16px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase;
        }
        
        .btn-primary { 
            background: var(--emerald); color: var(--gold); 
            border: 1px solid var(--gold);
        }
        .btn-primary:hover { background: #043a2c; color: #fff; }

        .btn-success { 
            background: var(--gold); color: var(--emerald); 
            margin-top: 20px;
        }

        /* 5. RESULTS */
        #result { margin-top: 30px; display: none; animation: fadeIn 0.8s; }
        #certPreview { 
            width: 100%; border: 5px solid white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            margin-bottom: 15px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</div>
    
    <div id="text-ku">
        <h1>وەرگرتنی بڕوانامە</h1>
        <p class="subtitle">خولی ڕاهێنانی مامۆستایانی قورئان و پەروەردەی ئیسلامی</p>
    </div>

    <div id="text-en" style="display: none;">
        <h1>Certification Portal</h1>
        <p class="subtitle">Welcome to your official course certification portal</p>
    </div>

    <input type="text" id="phoneInput" placeholder="07XX XXX XXXX">
    
    <button class="btn btn-primary" onclick="checkCertificate()" id="searchBtn">گەڕان • Search</button>

    <div id="result">
        <img id="certPreview" src="" alt="Certificate">
        <a id="downloadBtn" href="" download>
            <button class="btn btn-success">داگرتن • Download (JPG)</button>
        </a>
    </div>
</div>

<script>
    let currentLang = 'ku';
    // Mapping for your 15 participants
    const certificateMap = {
        "7719629570": "1", "44 774 507 1656": "2", "7501585449": "3",
        "7728577165": "4", "7501074835": "5", "7728609703": "6",
        "7715959936": "7", "7705006535": "8", "7741528909": "9",
        "7501266026": "10", "7504332792": "11", "7503601623": "12",
        "7701985499": "13", "7504739732": "14", "7804792174": "15"
    };

    function toggleLanguage() {
        const h = document.getElementById('htmlTag');
        const k = document.getElementById('text-ku');
        const e = document.getElementById('text-en');
        const b = document.getElementById('langBtn');
        if (currentLang === 'ku') {
            h.setAttribute('dir', 'ltr'); k.style.display = 'none'; e.style.display = 'block'; b.innerText = 'کوردی'; currentLang = 'en';
        } else {
            h.setAttribute('dir', 'rtl'); k.style.display = 'block'; e.style.display = 'none'; b.innerText = 'English'; currentLang = 'ku';
        }
    }

    function checkCertificate() {
        let inputRaw = document.getElementById('phoneInput').value.trim();
        let inputClean = inputRaw.replace(/[\s\-\(\)]/g, ""); 
        let foundSerial = null;
        for (let phone in certificateMap) {
            if (phone.replace(/[\s\-\(\)]/g, "") === inputClean) { foundSerial = certificateMap[phone]; break; }
        }
        if (foundSerial) {
            const fileName = "certs/" + foundSerial + ".jpg";
            const img = document.getElementById('certPreview');
            img.src = fileName;
            img.onload = function() {
                document.getElementById('downloadBtn').href = fileName;
                document.getElementById('result').style.display = "block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        } else {
            alert(currentLang === 'ku' ? "بڕوانامەکە نەدۆزرایەوە" : "Certificate not found");
        }
    }
</script>
</body>
</html>
