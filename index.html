<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certification Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        /* 1. FLEXIBLE LAYOUT */
        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center;
            filter: blur(12px); -webkit-filter: blur(12px);
            background-color: rgba(15, 23, 42, 0.5); background-blend-mode: multiply;
            transform: scale(1.1); z-index: -1;
        }

        /* 2. RESPONSIVE CONTAINER */
        .main-container {
            background: var(--bg-glass);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 95%; /* Responsive width */
            max-width: 420px; /* Limits size on desktop */
            box-sizing: border-box;
            position: relative;
            margin: 20px;
        }

        /* Language Toggle - Mobile Friendly */
        .lang-switch {
            position: absolute; top: 1rem; left: 1rem;
            background: #f1f5f9; padding: 6px 16px; border-radius: 50px;
            cursor: pointer; font-size: 13px; font-weight: 700; border: 1px solid #e2e8f0;
        }
        [dir="ltr"] .lang-switch { left: auto; right: 1rem; }

        h1 { color: #1e293b; font-size: 1.5rem; margin: 1.5rem 0 0.5rem; font-weight: 700; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }

        /* 3. ADAPTIVE INPUTS */
        input {
            width: 100%; padding: 1rem; border: 2px solid #f1f5f9; border-radius: 14px;
            font-size: 1.1rem; box-sizing: border-box; text-align: center;
            direction: ltr; background: #f8fafc; transition: 0.2s;
            -webkit-appearance: none; /* Fixes mobile styling */
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn {
            width: 100%; padding: 1rem; border-radius: 14px; border: none;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: inline-block; box-sizing: border-box;
        }
        .btn-primary { background: var(--primary); color: white; margin-top: 1rem; }
        .btn-success { background: var(--success); color: white; margin-top: 1rem; text-decoration: none; }

        /* 4. FLEXIBLE IMAGE RESULT */
        #result { margin-top: 2rem; display: none; border-top: 1px solid #f1f5f9; padding-top: 1.5rem; }
        #certPreview { 
            width: 100%; /* Scales to container width */
            height: auto; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1); 
            margin-bottom: 1rem;
        }

        /* 5. TABLET & PHONE ADJUSTMENTS (MEDIA QUERIES) */
        @media (max-width: 480px) {
            .main-container { padding: 1.5rem; }
            h1 { font-size: 1.3rem; }
            .subtitle { font-size: 0.85rem; }
            input { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</div>
    
    <div id="text-ku">
        <h1>وەرگرتنی بڕوانامە</h1>
        <p class="subtitle">تکایە ژمارەی مۆبایلەکەت بنووسە بۆ داگرتنی بڕوانامە.</p>
    </div>

    <div id="text-en" style="display: none;">
        <h1>Certification Portal</h1>
        <p class="subtitle">Please enter your phone number to download your certificate.</p>
    </div>

    <input type="text" id="phoneInput" placeholder="07XX XXX XXXX">
    <button class="btn btn-primary" onclick="checkCertificate()" id="searchBtn">Search • گەڕان</button>

    <div id="result">
        <img id="certPreview" src="" alt="Preview">
        <a id="downloadBtn" href="" download>
            <button class="btn btn-success">Download • دابەزاندن</button>
        </a>
    </div>
</div>

<script>
    // Logic remains consistent to ensure reliability
    let currentLang = 'ku';
    const certificateMap = {
        "7719629570": "1", "44 774 507 1656": "2", "7501585449": "3",
        "7728577165": "4", "7501074835": "5", "7728609703": "6",
        "7715959936": "7", "7705006535": "8", "7741528909": "9",
        "7501266026": "10", "7504332792": "11", "7503601623": "12",
        "7701985499": "13", "7504739732": "14", "7804792174": "15"
    };

    function toggleLanguage() {
        const h = document.getElementById('htmlTag');
        const k = document.getElementById('text-ku');
        const e = document.getElementById('text-en');
        const b = document.getElementById('langBtn');
        if (currentLang === 'ku') {
            h.setAttribute('dir', 'ltr'); k.style.display = 'none'; e.style.display = 'block'; b.innerText = 'کوردی'; currentLang = 'en';
        } else {
            h.setAttribute('dir', 'rtl'); k.style.display = 'block'; e.style.display = 'none'; b.innerText = 'English'; currentLang = 'ku';
        }
    }

    function checkCertificate() {
        let inputRaw = document.getElementById('phoneInput').value.trim();
        let inputClean = inputRaw.replace(/[\s\-\(\)]/g, ""); 
        let foundSerial = null;
        for (let phone in certificateMap) {
            if (phone.replace(/[\s\-\(\)]/g, "") === inputClean) { foundSerial = certificateMap[phone]; break; }
        }
        if (foundSerial) {
            const fileName = "certs/" + foundSerial + ".jpg";
            const img = document.getElementById('certPreview');
            img.src = fileName;
            img.onload = function() {
                document.getElementById('downloadBtn').href = fileName;
                document.getElementById('result').style.display = "block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        } else {
            alert(currentLang === 'ku' ? "نەدۆزرایەوە" : "Not found");
        }
    }
</script>
</body>
</html>
