<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Portal | وەرگرتنی بڕوانامە</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&family=Noto+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --mint-light: #f0fdf4; /* Very light mint */
            --sage-medium: #15803d; /* Sage green for text/accents */
            --gold-soft: #c5a059;   /* Champagne gold */
            --white-pure: #ffffff;
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-color: #f8fafc;
        }

        /* 1. LIGHTER PATTERNED BACKGROUND */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center;
            filter: blur(10px) opacity(0.5); /* Much lighter blur */
            transform: scale(1.1); z-index: -1;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/p6-polka.png'); /* Subtle texture */
            opacity: 0.05; z-index: -1;
        }

        /* 2. THE CARD DESIGN */
        .main-container {
            background: var(--white-pure);
            padding: 120px 60px;
            border-radius: 20px; 
            border: 2px solid var(--gold-soft);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            width: 90%;
            max-width: 420px;
            position: relative;
            box-sizing: border-box;
        }

        .lang-switch {
            position: absolute; top: 12px; left: 12px;
            background: var(--mint-light); color: var(--sage-medium);
            padding: 4px 12px; border: 1px solid var(--sage-medium);
            border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold;
        }
        [dir="ltr"] .lang-switch { left: auto; right: 12px; }

        /* 3. TYPOGRAPHY */
        h1 { 
            font-family: 'Amiri', serif;
            color: var(--sage-medium); 
            font-size: 25px; 
            margin: 15px 0 5px;
        }
        
        .subtitle { 
            color: #64748b; 
            font-size: 16px; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }

        /* 4. FORM ELEMENTS */
        .input-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px;
            width: 100%;
            font-size: 18px;
            text-align: center;
            direction: ltr;
            margin-bottom: 15px;
            box-sizing: border-box;
            color: #1e293b;
        }
        .input-box:focus { outline: none; border-color: var(--gold-soft); background: white; }

        .btn {
            width: 100%; padding: 14px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s; border-radius: 10px; border: none;
        }
        
        .btn-primary { 
            background: var(--sage-medium); color: white; 
        }
        .btn-primary:hover { background: #166534; transform: translateY(-1px); }

        .btn-success { 
            background: var(--gold-soft); color: white; 
            margin-top: 15px; text-decoration: none; display: block;
        }

        /* 5. RESULTS */
        #result { margin-top: 25px; display: none; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        #certPreview { 
            width: 100%; border-radius: 8px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</div>
    
    <div id="text-ku">
        <h1>وەرگرتنی بڕوانامە</h1>
        <p class="subtitle">بەخێربێن، تکایە ژمارەی مۆبایلەکەت بنووسە بۆ داگرتنی بڕوانامە.</p>
    </div>

    <div id="text-en" style="display: none;">
        <h1>Certification Portal</h1>
        <p class="subtitle">Welcome, please enter your phone number to download your certificate.</p>
    </div>

    <input type="text" class="input-box" id="phoneInput" placeholder="07XX XXX XXXX">
    
    <button class="btn btn-primary" onclick="checkCertificate()" id="searchBtn">گەڕان • Search</button>

    <div id="result">
        <p style="color: var(--sage-medium); font-weight: bold; font-size: 14px; margin-bottom: 10px;">بڕوانامەکەت دۆزرایەوە / Found!</p>
        <img id="certPreview" src="" alt="Certificate">
        <a id="downloadBtn" href="" download>
            <button class="btn btn-success">داگرتن • Download</button>
        </a>
    </div>
</div>

<script>
    let currentLang = 'ku';
    const certificateMap = {
        "7719629570": "1", "44 774 507 1656": "2", "7501585449": "3",
        "7728577165": "4", "7501074835": "5", "7728609703": "6",
        "7715959936": "7", "7705006535": "8", "7741528909": "9",
        "7501266026": "10", "7504332792": "11", "7503601623": "12",
        "7701985499": "13", "7504739732": "14", "7804792174": "15"
    };

    function toggleLanguage() {
        const h = document.getElementById('htmlTag');
        const k = document.getElementById('text-ku');
        const e = document.getElementById('text-en');
        const b = document.getElementById('langBtn');
        if (currentLang === 'ku') {
            h.setAttribute('dir', 'ltr'); k.style.display = 'none'; e.style.display = 'block'; b.innerText = 'کوردی'; currentLang = 'en';
        } else {
            h.setAttribute('dir', 'rtl'); k.style.display = 'block'; e.style.display = 'none'; b.innerText = 'English'; currentLang = 'ku';
        }
    }

    function checkCertificate() {
        let inputRaw = document.getElementById('phoneInput').value.trim();
        let inputClean = inputRaw.replace(/[\s\-\(\)]/g, ""); 
        let foundSerial = null;
        for (let phone in certificateMap) {
            if (phone.replace(/[\s\-\(\)]/g, "") === inputClean) { foundSerial = certificateMap[phone]; break; }
        }
        if (foundSerial) {
            const fileName = "certs/" + foundSerial + ".jpg";
            const img = document.getElementById('certPreview');
            img.src = fileName;
            img.onload = function() {
                document.getElementById('downloadBtn').href = fileName;
                document.getElementById('result').style.display = "block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        } else {
            alert(currentLang === 'ku' ? "بڕوانامەکە نەدۆزرایەوە" : "Certificate not found");
        }
    }
</script>
</body>
</html>
