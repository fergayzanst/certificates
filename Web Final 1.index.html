<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            /* Prioritizes Noto Sans for Kurdish and Inter for English */
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; background-color: #0f172a;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center;
            filter: blur(12px); -webkit-filter: blur(12px);
            background-color: rgba(15, 23, 42, 0.5); background-blend-mode: multiply;
            transform: scale(1.1); z-index: -1;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.98); 
            padding: 40px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center; width: 90%; max-width: 440px;
            position: relative; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lang-switch {
            position: absolute; top: 20px; left: 20px;
            background: #f1f5f9; padding: 6px 14px; border-radius: 50px;
            cursor: pointer; font-size: 12px; font-weight: 700; border: 1px solid #e2e8f0;
            color: var(--text-dark); transition: all 0.2s;
        }
        .lang-switch:hover { background: #e2e8f0; }
        [dir="ltr"] .lang-switch { left: auto; right: 20px; }

        h1 { color: var(--text-dark); font-size: 28px; margin: 10px 0; font-weight: 700; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-light); font-size: 15px; margin-bottom: 30px; line-height: 1.6; }

        .input-group { margin-bottom: 25px; text-align: inherit; }
        label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--text-dark); font-size: 14px; }

        input {
            width: 100%; padding: 16px; border: 2px solid #f1f5f9; border-radius: 12px;
            font-size: 18px; box-sizing: border-box; text-align: center; direction: ltr;
            background: #f8fafc; transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary-color); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
            text-decoration: none; display: inline-block;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }

        .btn-success { background: var(--success-color); color: white; margin-top: 15px; }
        .btn-success:hover { background: #15803d; }

        #result { margin-top: 35px; display: none; border-top: 1px solid #f1f5f9; padding-top: 25px; animation: fadeIn 0.6s ease-out; }
        #certPreview { max-width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</div>
    
    <div id="text-ku">
        <h1>وەرگرتنی بڕوانامە</h1>
        <p class="subtitle">بۆ بینین و دابەزاندنی بڕوانامەکەت، تکایە ئەو ژمارەی مۆبایلە بنووسە کە پێی تۆمار بوویت.</p>
        <div class="input-group"><label>ژمارەی مۆبایل</label></div>
    </div>

    <div id="text-en" style="display: none;">
        <h1>Certification Portal</h1>
        <p class="subtitle">To view and download your certificate, please enter the phone number you used for registration.</p>
        <div class="input-group"><label>Phone Number</label></div>
    </div>

    <input type="text" id="phoneInput" placeholder="07XX XXX XXXX">
    <br><br>
    
    <button class="btn btn-primary" onclick="checkCertificate()" id="searchBtn">گەڕان • Search</button>

    <div id="result">
        <p id="resMsg" style="color: var(--success-color); font-weight: 700; margin-bottom: 15px;">بڕوانامەکەت دۆزرایەوە! / Certificate Found!</p>
        <img id="certPreview" src="" alt="Certificate Preview">
        <a id="downloadBtn" href="" download>
            <button class="btn btn-success" id="dlBtn">دابەزاندن • Download</button>
        </a>
    </div>
</div>

<script>
    let currentLang = 'ku';

    function toggleLanguage() {
        const html = document.getElementById('htmlTag');
        const kuDiv = document.getElementById('text-ku');
        const enDiv = document.getElementById('text-en');
        const btn = document.getElementById('langBtn');

        if (currentLang === 'ku') {
            html.setAttribute('dir', 'ltr');
            html.setAttribute('lang', 'en');
            kuDiv.style.display = 'none';
            enDiv.style.display = 'block';
            btn.innerText = 'کوردی';
            currentLang = 'en';
        } else {
            html.setAttribute('dir', 'rtl');
            html.setAttribute('lang', 'ku');
            kuDiv.style.display = 'block';
            enDiv.style.display = 'none';
            btn.innerText = 'English';
            currentLang = 'ku';
        }
    }

    const certificateMap = {
        "7719629570": "1", "44 774 507 1656": "2", "7501585449": "3",
        "7728577165": "4", "7501074835": "5", "7728609703": "6",
        "7715959936": "7", "7705006535": "8", "7741528909": "9",
        "7501266026": "10", "7504332792": "11", "7503601623": "12",
        "7701985499": "13", "7504739732": "14", "7804792174": "15"
    };

    function normalizeNumbers(str) {
        const p = [/۰/g, /۱/g, /۲/g, /۳/g, /۴/g, /۵/g, /۶/g, /۷/g, /۸/g, /۹/g];
        const a = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
        for (let i = 0; i < 10; i++) { str = str.replace(p[i], i).replace(a[i], i); }
        return str;
    }

    function checkCertificate() {
        let inputRaw = document.getElementById('phoneInput').value.trim();
        let inputClean = normalizeNumbers(inputRaw).replace(/[\s\-\(\)]/g, ""); 

        if (!inputClean) {
            alert(currentLang === 'ku' ? "تکایە ژمارەی مۆبایل بنووسە" : "Please enter a phone number");
            return;
        }

        let foundSerial = null;
        for (let phoneNumber in certificateMap) {
            let cleanKey = phoneNumber.replace(/[\s\-\(\)]/g, "");
            if (cleanKey === inputClean) { foundSerial = certificateMap[phoneNumber]; break; }
        }

        if (foundSerial) {
            const fileName = "certs/" + foundSerial + ".jpg";
            const imgPreview = document.getElementById('certPreview');
            imgPreview.src = fileName;
            imgPreview.onload = function() {
                document.getElementById('downloadBtn').href = fileName;
                document.getElementById('result').style.display = "block";
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            };
            imgPreview.onerror = function() {
                alert(currentLang === 'ku' ? "وێنەکە نەدۆزرایەوە لە فۆڵدەری certs" : "Image not found in certs folder");
            };
        } else {
            alert(currentLang === 'ku' ? "هیچ بڕوانامەیەک بەم ژمارەیە نەدۆزرایەوە" : "No certificate found for this number");
        }
    }
</script>

</body>
</html>
